name: Deploy PagesSite to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'PagesSite/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PagesSite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PagesSite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_USERNAME_HASH: ${{ secrets.VITE_USERNAME_HASH }}
          VITE_PASSWORD_HASH: ${{ secrets.VITE_PASSWORD_HASH }}

      - name: Deploy to gh-pages
        working-directory: PagesSite/dist
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy to gh-pages [skip ci]"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@${GITHUB_SERVER_URL#https://}/Zappmod/UMB-Bobathon.git"
          git push -f origin gh-pages
